# This is a Databricks asset bundle definition for demand_forecasting_pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: demand_forecasting_pipeline
  uuid: 2959c357-e7fc-416e-bf98-7b158d8481a0

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  user_name:
    description: "Databricks User Name"
    default: "eryk"


targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-1d786d18-2ed6.cloud.databricks.com/
    variables:
      catalog: default
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-1d786d18-2ed6.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/erykwitkowski2@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/erykwitkowski2@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: default
      schema: prod
    permissions:
      - user_name: ${var.user_name}
        level: CAN_MANAGE
