resources:
  jobs:
    ingest_data_job:
      name: ingest_data_job

      tasks:
        - task_key: ingest
          spark_python_task:
            python_file: ../src/ingestion/main.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - requests
