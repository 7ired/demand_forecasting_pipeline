resources:
  jobs:
    hello_world_job:
      name: hello_world_job
      tasks:
        - task_key: say_hello
          spark_python_task:
            python_file: ../src/hello_world.py
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - requests
